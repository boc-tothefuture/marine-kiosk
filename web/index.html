<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experimental Tidelog | 24-Hour Dashboard</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@200;300;400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app-wrapper">
    <div id="tidelog-container">

      <!-- Top Header Row -->
      <header id="tidelog-header">
        <div class="header-left">
          <div id="station-name">PORTLAND HARBOR</div>
          <div id="digital-date">--</div>
        </div>

        <div class="header-center">
          <div id="day-navigation">
            <span id="badge-today" class="nav-badge active">Today</span>
            <span id="badge-tomorrow" class="nav-badge">Tomorrow</span>
          </div>
          <div id="digital-time">--:--<span>--</span></div>
        </div>

        <div class="header-right">
          <div id="active-readout">
            <span id="current-tide-val">--</span>
            <span id="current-tide-unit">FT</span>
            <span id="current-tide-slope">↑</span>
          </div>
          <div id="current-status-val">--</div>
        </div>
      </header>

      <!-- Main Layout Section: Chart in Center, Widgets on Left/Right -->
      <main id="tidelog-content">


        <!-- Central Tidelog Graph Visualizer -->
        <section class="center-graph-panel">
          <div class="graph-instrument">
            <div id="scrollable-timeline">

            <!-- SVG Plotting Canvas -->
            <svg id="tidelog-svg" viewBox="0 0 2000 400" preserveAspectRatio="none">
              <defs>
                <!-- Sun Daylight Shading Gradient (behind curve) -->
                <linearGradient id="sun-fill-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.38" />
                  <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.18" />
                  <stop offset="100%" stop-color="#d97706" stop-opacity="0.0" />
                </linearGradient>

                <!-- Tide Curve Gradient (Highly Opaque Ocean) -->
                <linearGradient id="wave-fill-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#0e7490" stop-opacity="0.88" />
                  <stop offset="100%" stop-color="#02141a" stop-opacity="0.95" />
                </linearGradient>

                <!-- Glow Filters -->
                <filter id="cyan-glow" x="-10%" y="-10%" width="120%" height="120%">
                  <feGaussianBlur stdDeviation="4" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>

              <!-- Sun Background Daylight Area (Circular Sun Semicircle) -->
              <path id="sun-path" d="" fill="url(#sun-fill-grad)" />
              <path id="sun-stroke-path" d="" fill="none" stroke="#fbbf24" stroke-dasharray="3,6" stroke-width="2"
                opacity="0.6" />

              <!-- Sunrise/Sunset Vertical Lines & Labels -->
              <line id="sunrise-line" x1="0" y1="0" x2="0" y2="340" stroke="#fbbf24" stroke-dasharray="3,6"
                stroke-width="1.5" opacity="0.5" />
              <line id="sunset-line" x1="0" y1="0" x2="0" y2="340" stroke="#fbbf24" stroke-dasharray="3,6"
                stroke-width="1.5" opacity="0.5" />


              <!-- Sunrise Stacked Label -->
              <text id="sunrise-text-label" x="0" y="-20" fill="#fbbf24" font-family="'Outfit', sans-serif"
                font-size="9" font-weight="400" text-anchor="middle" opacity="0.7">Sunrise</text>
              <text id="sunrise-time-label" x="0" y="-8" fill="#fbbf24" font-family="'Outfit', sans-serif"
                font-size="10" font-weight="600" text-anchor="middle" opacity="0.85"></text>

              <!-- Sunset Stacked Label -->
              <text id="sunset-text-label" x="0" y="-20" fill="#fbbf24" font-family="'Outfit', sans-serif" font-size="9"
                font-weight="400" text-anchor="middle" opacity="0.7">Sunset</text>
              <text id="sunset-time-label" x="0" y="-8" fill="#fbbf24" font-family="'Outfit', sans-serif" font-size="10"
                font-weight="600" text-anchor="middle" opacity="0.85"></text>


              <!-- Moonrise/Moonset Vertical Lines & Labels -->
              <line id="moonrise-line" x1="0" y1="0" x2="0" y2="340" stroke="#64748b" stroke-dasharray="3,6"
                stroke-width="1.5" opacity="0.5" />
              <line id="moonset-line" x1="0" y1="0" x2="0" y2="340" stroke="#64748b" stroke-dasharray="3,6"
                stroke-width="1.5" opacity="0.5" />

              <!-- Moonrise Stacked Label -->
              <text id="moonrise-text-label" x="0" y="-20" fill="#64748b" font-family="'Outfit', sans-serif"
                font-size="9" font-weight="400" text-anchor="middle" opacity="0.7">Moonrise</text>
              <text id="moonrise-time-label" x="0" y="-8" fill="#64748b" font-family="'Outfit', sans-serif"
                font-size="10" font-weight="600" text-anchor="middle" opacity="0.85"></text>

              <!-- Moonset Stacked Label -->
              <text id="moonset-text-label" x="0" y="-20" fill="#64748b" font-family="'Outfit', sans-serif"
                font-size="9" font-weight="400" text-anchor="middle" opacity="0.7">Moonset</text>
              <text id="moonset-time-label" x="0" y="-8" fill="#64748b" font-family="'Outfit', sans-serif"
                font-size="10" font-weight="600" text-anchor="middle" opacity="0.85"></text>

              <!-- Sunrise/Sunset Vertical Lines & Labels (Day 2) -->
              <line id="sunrise-line-2" x1="0" y1="0" x2="0" y2="340" stroke="#fbbf24" stroke-dasharray="3,6"
                stroke-width="1.5" opacity="0.5" />
              <line id="sunset-line-2" x1="0" y1="0" x2="0" y2="340" stroke="#fbbf24" stroke-dasharray="3,6"
                stroke-width="1.5" opacity="0.5" />

              <!-- Sunrise Stacked Label (Day 2) -->
              <text id="sunrise-text-label-2" x="0" y="-20" fill="#fbbf24" font-family="'Outfit', sans-serif"
                font-size="9" font-weight="400" text-anchor="middle" opacity="0.7">Sunrise</text>
              <text id="sunrise-time-label-2" x="0" y="-8" fill="#fbbf24" font-family="'Outfit', sans-serif"
                font-size="10" font-weight="600" text-anchor="middle" opacity="0.85"></text>

              <!-- Sunset Stacked Label (Day 2) -->
              <text id="sunset-text-label-2" x="0" y="-20" fill="#fbbf24" font-family="'Outfit', sans-serif" font-size="9"
                font-weight="400" text-anchor="middle" opacity="0.7">Sunset</text>
              <text id="sunset-time-label-2" x="0" y="-8" fill="#fbbf24" font-family="'Outfit', sans-serif" font-size="10"
                font-weight="600" text-anchor="middle" opacity="0.85"></text>

              <!-- Moonrise/Moonset Vertical Lines & Labels (Day 2) -->
              <line id="moonrise-line-2" x1="0" y1="0" x2="0" y2="340" stroke="#64748b" stroke-dasharray="3,6"
                stroke-width="1.5" opacity="0.5" />
              <line id="moonset-line-2" x1="0" y1="0" x2="0" y2="340" stroke="#64748b" stroke-dasharray="3,6"
                stroke-width="1.5" opacity="0.5" />

              <!-- Moonrise Stacked Label (Day 2) -->
              <text id="moonrise-text-label-2" x="0" y="-20" fill="#64748b" font-family="'Outfit', sans-serif"
                font-size="9" font-weight="400" text-anchor="middle" opacity="0.7">Moonrise</text>
              <text id="moonrise-time-label-2" x="0" y="-8" fill="#64748b" font-family="'Outfit', sans-serif"
                font-size="10" font-weight="600" text-anchor="middle" opacity="0.85"></text>

              <!-- Moonset Stacked Label (Day 2) -->
              <text id="moonset-text-label-2" x="0" y="-20" fill="#64748b" font-family="'Outfit', sans-serif"
                font-size="9" font-weight="400" text-anchor="middle" opacity="0.7">Moonset</text>
              <text id="moonset-time-label-2" x="0" y="-8" fill="#64748b" font-family="'Outfit', sans-serif"
                font-size="10" font-weight="600" text-anchor="middle" opacity="0.85"></text>

              <!-- Dotted Lunar Transit Arc -->
              <path id="lunar-transit-path" d="" fill="none" stroke="#64748b" stroke-dasharray="3,6"
                stroke-width="1.5" />

              <!-- Moon Icon sliding group -->
              <g id="moon-indicator-group" transform="translate(0,0)">
                <circle cx="0" cy="0" r="14" fill="#0f172a" stroke="#64748b" stroke-width="1" />
                <text id="moon-indicator-icon" x="0" y="0" font-size="18" text-anchor="middle"
                  dominant-baseline="central">🌑</text>
              </g>

              <!-- Vertical Grid Hours Lines -->
              <g id="tidelog-grid-lines"></g>

              <!-- Tide Wave Fills & Curves -->
              <path id="wave-fill-path" d="" fill="url(#wave-fill-grad)" />
              <path id="wave-stroke-path" d="" fill="none" stroke="#06b6d4" stroke-width="3" filter="url(#cyan-glow)" />

              <!-- Real-time Vertical NOW line -->
              <line id="now-marker-line" x1="0" y1="0" x2="0" y2="400" stroke="#e11d48" stroke-dasharray="5,5"
                stroke-width="1.5" />
            </svg>

            <!-- HTML Overlay for High/Low tide callouts -->
            <div id="tide-overlay-labels">
              <!-- Real-time HTML indicator dot to prevent SVG scale distortion -->
              <div id="now-marker-dot"></div>
            </div>

            <!-- Horizontal currents timeline container row -->
            <div id="currents-timeline-container">
              <div class="currents-header"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span class="currents-title">Predicted Currents</span>
                <span class="currents-legend"
                  style="font-size: 0.75rem; font-family: 'Inter', sans-serif; font-weight: 500;">
                  <span style="color: #06b6d4; margin-left: 15px;">↑ Flood</span>
                  <span style="color: #ec4899; margin-left: 15px;">↓ Ebb</span>
                  <span style="color: #64748b; margin-left: 15px;">◇ Slack</span>
                </span>
              </div>

              <div id="currents-timeline-bar" style="position: relative; height: 80px; margin-top: 10px;">
                <!-- Symmetrical SVG Current Velocity Canvas -->
                <svg id="currents-svg" viewBox="0 0 2000 80" preserveAspectRatio="none"
                  style="width: 100%; height: 100%; display: block; overflow: visible;">
                  <defs>
                    <!-- Flood Curve Gradient (Teal) -->
                    <linearGradient id="flood-fill-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4" />
                      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.0" />
                    </linearGradient>
                    <!-- Ebb Curve Gradient (Pink) -->
                    <linearGradient id="ebb-fill-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.0" />
                      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.4" />
                    </linearGradient>
                  </defs>

                  <!-- Center Zero/Slack Axis Line -->
                  <line x1="0" y1="40" x2="1000" y2="40" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4" />

                  <!-- Dynamic Curves -->
                  <path id="currents-flood-path" d="" fill="url(#flood-fill-grad)" />
                  <path id="currents-ebb-path" d="" fill="url(#ebb-fill-grad)" />
                  <path id="currents-stroke-path" d="" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.6" />
                </svg>

                <!-- Wrapper to overlay text labels dynamically over the curve peaks -->
                <div id="currents-events-wrapper"
                  style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
            </div>

            <!-- Horizontal weather timeline container row -->
            <div id="weather-timeline-container" style="margin-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 15px;">
              <div class="weather-header"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span class="weather-title" style="font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase;">Marine Wind & Seas</span>
                <span class="weather-station-label" style="font-size: 0.72rem; font-family: 'Inter', sans-serif; color: var(--text-muted); opacity: 0.7;">NOAA ZONE ANZ153</span>
              </div>
              <div id="weather-timeline-bar" style="position: relative; height: 60px; display: flex; gap: 8px;">
                <!-- Dynamically populated Night, Day, Night timeline blocks -->
              </div>
            </div>

          </div>
          </div>
        </section>


        </main>

      <!-- Footer Info -->
      <footer id="tidelog-footer">
        <span class="station-meta">NOAA TIDE STATION: <span id="meta-station-id">--</span> | CURRENT STATION:
          <span id="meta-currents-station-id">--</span></span>
        <span class="update-meta" id="last-updated-text">UPDATED: --</span>
      </footer>

    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
