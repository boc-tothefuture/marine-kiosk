<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tide Clock TV Dashboard - Portland, ME</title>
  <!-- Google Fonts for premium clean typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Fullscreen display wrapper -->
  <div id="app-wrapper">
    <div id="clock-container" class="theme-ocean">
      
      <!-- Top Section: Time and Current Tide readouts -->
      <header id="dashboard-header">
        <!-- Top Left: Large Clock -->
        <div class="header-left">
          <div id="digital-time">12:34<span>PM</span></div>
          <div id="digital-date">Friday, October 27, 2023</div>
          <div id="moon-phase">
            <span id="moon-symbol">--</span>
            <span id="moon-name">--</span>
          </div>
        </div>
        
        <!-- Top Center: NWS Coastal Marine Forecast Ticker -->
        <div id="forecast-header-container">
          <div class="forecast-ticker-title">Casco Bay Forecast</div>
          <div id="forecast-header-scroll">
            <div id="forecast-scroll-wrapper">
              <!-- Dynamically populated vertical sliding periods -->
            </div>
          </div>
        </div>
        
        <!-- Top Right: Giant Tide Reading -->
        <div class="header-right">
          <div id="current-tide-readout">
            <span id="current-tide-val">+8.2</span>
            <span id="current-tide-unit">FT</span>
          </div>
          <div id="tide-status-container">
            <span id="tide-status-text">RISING TIDE</span>
            <div id="status-pulse-dot" class="pulse-dot"></div>
          </div>
          <div id="water-temp-container">
            <span id="water-temp-label">WATER TEMP</span>
            <span id="water-temp-val">--</span>
          </div>
          <div id="current-status-container">
            <span id="current-status-label">HARBOR CURRENT</span>
            <span id="current-status-val">--</span>
          </div>
          <div id="bar-status-container">
            <span id="bar-status-label">GDI-LDI BAR</span>
            <div class="bar-status-badge-wrapper">
              <span id="bar-status-val" class="bar-closed">CLOSED</span>
              <span id="bar-status-sub">Opens at --:--</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Middle Section: Dynamic SVG Wave Plot Area -->
      <main id="wave-plot-container">
        <!-- Tide Curve Plot (Full Width) -->
        <div id="wave-plot-left">
          <!-- SVG Canvas for drawing paths -->
          <svg id="tide-svg" viewBox="0 0 1000 400" preserveAspectRatio="none">
            <!-- Definitions for gradients and filters -->
            <defs>
              <!-- Wave Area Fill Gradient -->
              <linearGradient id="wave-fill-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3" />
                <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.0" />
              </linearGradient>
              
              <!-- Glow Filter for the wave stroke -->
              <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="6" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>

            <!-- Filled Wave Area -->
            <path id="wave-fill-path" d="" fill="url(#wave-fill-grad)" />
            
            <!-- Neon Glowing Wave Stroke Line -->
            <path id="wave-stroke-path" d="" fill="none" stroke="#06b6d4" stroke-width="4" filter="url(#cyan-glow)" />
            
            <!-- Walkable overlay paths (Tide < 4.0 ft with warnings) -->
            <path id="wave-walkable-path" d="" fill="none" stroke="#10b981" stroke-width="4.5" />
            <path id="wave-warning-path" d="" fill="none" stroke="#f59e0b" stroke-width="4.5" />
            <path id="wave-danger-path" d="" fill="none" stroke="#ef4444" stroke-width="4.5" />
            
            <!-- Vertical Dashed Hour Marker (NOW) -->
            <line id="now-marker-line" x1="0" y1="0" x2="0" y2="400" stroke="#475569" stroke-dasharray="6,6" stroke-width="1.5" />
            
            <!-- Active Time Dot Intersection (Dual-circle glow to avoid filter rendering bugs) -->
            <circle id="now-marker-glow" cx="0" cy="0" r="0" fill="#06b6d4" opacity="0" />
          </svg>

          <!-- HTML Overlay for High/Low tide callouts (dynamically positioned by app.js) -->
          <div id="tide-overlay-labels">
            <!-- Dynamic High/Low Tide text tags will be appended here -->
          </div>

          <!-- Real-time Active Time Indicator Dot (drawn in HTML to prevent SVG aspect ratio stretching) -->
          <div id="now-marker-dot"></div>
        </div>
      </main>

      <!-- Bottom Section: Timeline Labels -->
      <footer id="dashboard-footer">
        <div id="timeline-labels">
          <!-- Dynamically populated or static hour labels -->
          <div class="time-tick">00</div>
          <div class="time-tick">02</div>
          <div class="time-tick">04</div>
          <div class="time-tick">06</div>
          <div class="time-tick">08</div>
          <div class="time-tick">10</div>
          <div class="time-tick">12</div>
          <div class="time-tick">14</div>
          <div class="time-tick">16</div>
          <div class="time-tick">18</div>
          <div class="time-tick">20</div>
          <div class="time-tick">22</div>
          <div class="time-tick">00</div>
        </div>
        <div id="footer-bottom-row">
          <div id="legend-container">
            <span class="legend-box"></span>
            <span class="legend-label">Walkable Bar (&lt; 4.0 FT)</span>
          </div>
          <div id="meta-info">
            <span id="station-name">PORTLAND, MAINE</span>
            <span class="meta-sep">•</span>
            <span id="last-updated-text">UPDATED: --</span>
          </div>
        </div>
      </footer>
      
      <!-- Invisible Settings Trigger (Click anywhere in the very corners or press 'S' key, but we'll place a subtle button) -->
      <button id="settings-toggle" aria-label="Settings" title="Configure Tide Clock">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
        </svg>
      </button>

      <!-- Settings Panel Modal -->
      <div id="settings-panel" class="hidden">
        <div class="settings-content">
          <h2>Tide Clock Settings</h2>
          
          <div class="settings-group">
            <label for="setting-theme">Color Theme</label>
            <select id="setting-theme">
              <option value="ocean">Ocean Cyan & Blue</option>
              <option value="cyber">Cyberpunk Pink & Yellow</option>
              <option value="mono">Monochromatic White & Rose</option>
              <option value="amber">Retro Amber</option>
            </select>
          </div>

          <div class="settings-group">
            <label for="setting-scale">Vertical Scaling</label>
            <select id="setting-scale">
              <option value="dynamic">Dynamic (Scale to Day's Range)</option>
              <option value="fixed">Fixed (-2.0 ft to +12.0 ft)</option>
            </select>
          </div>

          <div class="settings-group">
            <label for="setting-source">Data Mode</label>
            <select id="setting-source">
              <option value="live">Live NOAA Data (Portland, ME)</option>
              <option value="sim">Simulated Offline Demo</option>
            </select>
          </div>

          <div class="settings-actions">
            <button id="settings-save">Apply Settings</button>
            <button id="settings-close">Cancel</button>
          </div>
        </div>
      </div>
      
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
